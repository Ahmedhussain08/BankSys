<nav class="sidebar-nav">

<a href="accounts.html" class="nav-link"><i class="fa-solid fa-users"></i>Accounts</a>
<a href="deposit.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i>Deposit</a>
<a href="withdraw.html" class="nav-link"><i class="fa-solid fa-wallet"></i>Withdraw</a>

</nav>

</aside>
<div class="main">
<div class="topbar">
<div>
<div class="eyebrow">Operations</div>
<h1>Create New Account</h1>
</div>
<button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
</div>
<div class="content content-narrow">

<div class="card">
<div class="card-header accent-primary"><i class="fa-solid fa-user-plus"></i><h3>New Account Details</h3></div>
<div class="card-body">

<div id="message"></div>

<div class="field">
<label class="form-label">Account ID</label>
<input type="number" id="id" class="form-control" placeholder="e.g. 1001">
</div>

<div class="field">
<label class="form-label">Account Holder Name</label>
<input type="text" id="name" class="form-control" placeholder="Full name">
</div>

<div class="field">
<label class="form-label">Account Type</label>
<select id="accountType" class="form-select">
<option value="Savings">Savings</option>
<option value="Current">Current</option>
</select>
</div>

<div class="field">
<label class="form-label">Initial Balance</label>
<input type="number" id="balance" class="form-control" placeholder="0">
</div>

<button class="btn btn-primary btn-block" onclick="createAccount()"><i class="fa-solid fa-check"></i> Create Account</button>

</div>
</div>
</div>
</div>
</div>
<script src="script.js"></script>
<script>
async function createAccount(){

const data={
id:Number(document.getElementById('id').value),
name:document.getElementById('name').value,
accountType:document.getElementById('accountType').value,
balance:Number(document.getElementById('balance').value)
};

const res=await fetch('/accounts',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)
});

const result=await res.json();

document.getElementById('message').innerHTML=
`<div class="alert ${result.success?'alert-success':'alert-danger'}">${result.message}</div>`;

if(result.success){
document.getElementById('id').value='';
document.getElementById('name').value='';
document.getElementById('balance').value='';
}
}
</script>

</body>
</html>
