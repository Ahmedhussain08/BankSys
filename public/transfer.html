<div class="main">
<div class="topbar">
<div>
<div class="eyebrow">Operations</div>
<h1>Transfer Money</h1>
</div>
<button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
</div>
<div class="content content-narrow">

<div class="card">
<div class="card-header accent-info"><i class="fa-solid fa-right-left"></i><h3>Transfer Money</h3></div>
<div class="card-body">

<div id="message"></div>

<div class="field">
<label class="form-label">From Account ID</label>
<input type="number" id="fromId" class="form-control" placeholder="e.g. 1001">
</div>

<div class="field">
<label class="form-label">To Account ID</label>
<input type="number" id="toId" class="form-control" placeholder="e.g. 1002">
</div>

<div class="field">
<label class="form-label">Amount</label>
<input type="number" id="amount" class="form-control" placeholder="0">
</div>

<button class="btn btn-info btn-block" onclick="transferMoney()"><i class="fa-solid fa-right-left"></i> Transfer</button>

</div>
</div>
</div>
</div>
</div>
<script src="script.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
if(params.has("id")){
document.getElementById("fromId").value=params.get("id");
}

async function transferMoney(){

const data={
fromId:Number(document.getElementById("fromId").value),
toId:Number(document.getElementById("toId").value),
amount:Number(document.getElementById("amount").value)
};

const response=await fetch("/transfer",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result=await response.json();

document.getElementById("message").innerHTML=
`<div class="alert ${result.success?"alert-success":"alert-danger"}">${result.message}</div>`;

if(result.success){
document.getElementById("toId").value="";
document.getElementById("amount").value="";
}
}
</script>

</body>
