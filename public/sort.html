</head>

<div class="sidebar-brand">

<div class="name">BankSys.</div>

</div>
</div>
<nav class="sidebar-nav">
<span class="nav-eyebrow">Overview</span>
<a href="index.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i>Dashboard</a>
<span class="nav-eyebrow">Operations</span>
<a href="create.html" class="nav-link"><i class="fa-solid fa-user-plus"></i>Create Account</a>
<a href="accounts.html" class="nav-link"><i class="fa-solid fa-users"></i>Accounts</a>
<a href="deposit.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i>Deposit</a>
<a href="withdraw.html" class="nav-link"><i class="fa-solid fa-wallet"></i>Withdraw</a>
<a href="transfer.html" class="nav-link"><i class="fa-solid fa-right-left"></i>Transfer</a>
<span class="nav-eyebrow">Records</span>
<a href="search.html" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i>Search</a>

</nav>
<div class="sidebar-foot">Vault secured &middot; internal use only</div>
</aside>
<div class="main">
<div class="topbar">
<div>
<div class="eyebrow">Records</div>
<h1>Sort Accounts</h1>
</div>
<button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
</div>
<div class="content">

<div class="card">
<div class="card-header accent-violet"><i class="fa-solid fa-arrow-down-wide-short"></i><h3>Sort Accounts (Quick Sort)</h3></div>
<div class="card-body">

<div class="toolbar">
<button class="btn btn-primary" onclick="sortById()"><i class="fa-solid fa-hashtag"></i> Sort by Account ID</button>
<button class="btn btn-success" onclick="sortByBalance()"><i class="fa-solid fa-sack-dollar"></i> Sort by Balance</button>
</div>

<div class="table-wrap">
<table class="ledger">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Type</th>
<th style="text-align:right;">Balance</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>
</div>
</div>
</div>
</div>
<script src="script.js"></script>
<script>

async function displayAccounts(url){

const response=await fetch(url);
const accounts=await response.json();

const body=document.getElementById("tableBody");
body.innerHTML="";

if(accounts.length===0){
body.innerHTML='<tr class="empty-row"><td colspan="4">No accounts to display.</td></tr>';
return;
}

accounts.forEach(account=>{

const typeClass = account.accountType==='Savings' ? 'badge-savings' : 'badge-current';

body.innerHTML+=`
<tr>
<td class="mono">${account.id}</td>
<td>${account.name}</td>
<td><span class="badge-type ${typeClass}">${account.accountType}</span></td>
<td class="cell-amount">Rs. ${account.balance}</td>
</tr>
`;

});

}

function sortById(){
displayAccounts("/sort/id");
}

function sortByBalance(){
displayAccounts("/sort/balance");
}

displayAccounts("/accounts");

</script>

</body>
</html>
