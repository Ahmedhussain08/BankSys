</head>
<body>
<div class="app-shell">
<aside class="sidebar" id="sidebar">

<div class="name">BankSys.</div>

</div>
</div>
<nav class="sidebar-nav">
<span class="nav-eyebrow">Overview</span>
<a href="index.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i>Dashboard</a>
<span class="nav-eyebrow">Operations</span>
<a href="create.html" class="nav-link"><i class="fa-solid fa-user-plus"></i>Create Account</a>
<a href="accounts.html" class="nav-link"><i class="fa-solid fa-users"></i>Accounts</a>
<a href="deposit.html" class="nav-link"><i class="fa-solid fa-money-bill-wave"></i>Deposit</a>
<a href="withdraw.html" class="nav-link"><i class="fa-solid fa-wallet"></i>Withdraw</a>
<a href="transfer.html" class="nav-link"><i class="fa-solid fa-right-left"></i>Transfer</a>

<div class="sidebar-foot">Vault secured &middot; internal use only</div>
</aside>
<div class="main">
<div class="topbar">
<div>
<div class="eyebrow">Records</div>
<h1>Transaction History</h1>
</div>
<button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
</div>
<div class="content">

<div class="card">
<div class="card-header accent-danger"><i class="fa-solid fa-clock-rotate-left"></i><h3>Transaction History</h3></div>
<div class="card-body table-wrap">

<table class="ledger">

<thead>

<tr>

<th>#</th>

<th>Type</th>

<th>From</th>

<th>To</th>

<th style="text-align:right;">Amount</th>

<th>Date</th>

</tr>

</thead>

<tbody id="transactionTable">

</tbody>

</table>

</div>

</div>
</div>
</div>
</div>
<script src="script.js"></script>
<script>

async function loadTransactions(){

const response = await fetch("/transactions");

const transactions = await response.json();

const table = document.getElementById("transactionTable");

table.innerHTML = "";

if(transactions.length===0){

table.innerHTML=`
<tr class="empty-row">
<td colspan="6">
No Transactions Found
</td>
</tr>`;

return;

}

transactions.forEach((transaction,index)=>{

const typeClass = (transaction.type||"").toLowerCase();
const typeIcon = typeClass==="deposit" ? "fa-arrow-down" : typeClass==="withdraw" ? "fa-arrow-up" : "fa-right-left";

table.innerHTML += `

<tr>

<td class="mono">${index+1}</td>

<td><span class="badge-tx ${typeClass}"><i class="fa-solid ${typeIcon}"></i>${transaction.type}</span></td>

<td class="mono">${transaction.from ?? "-"}</td>

<td class="mono">${transaction.to ?? "-"}</td>

<td class="cell-amount">Rs. ${transaction.amount}</td>

<td class="mono">${transaction.date}</td>

</tr>

`;

});

}

loadTransactions();

</script>

</body>
</html>
